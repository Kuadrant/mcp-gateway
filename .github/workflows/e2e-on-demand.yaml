name: E2E Tests (on-demand)

on:
  issue_comment:
    types: [created]

jobs:
  check-permission:
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/test-e2e')
    outputs:
      is-member: ${{ steps.check-org.outputs.is-member }}
      suite: ${{ steps.parse-command.outputs.suite }}
    steps:
      - name: Check org membership
        id: check-org
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const response = await github.rest.orgs.checkMembershipForUser({
                org: 'Kuadrant',
                username: context.payload.comment.user.login
              });
              core.setOutput('is-member', response.status === 204 || response.status === 302);
            } catch (error) {
              // 404 means not a member
              core.setOutput('is-member', false);
            }

      - name: Parse command
        id: parse-command
        run: |
          COMMENT="${{ github.event.comment.body }}"
          # Extract suite from "/test-e2e <suite>"
          SUITE=$(echo "$COMMENT" | grep -oP '/test-e2e\s+\K\w+' || echo "")
          if [[ "$SUITE" != "happy" && "$SUITE" != "full" && "$SUITE" != "gevals" ]]; then
            echo "Invalid or missing suite. Use: /test-e2e happy, /test-e2e full or /test-e2e gevals"
            SUITE=""
          fi
          echo "suite=$SUITE" >> $GITHUB_OUTPUT

      - name: React to comment
        if: steps.check-org.outputs.is-member == 'true' && steps.parse-command.outputs.suite != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Reject non-members
        if: steps.check-org.outputs.is-member != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: '-1'
            });
            core.setFailed('User is not a member of the Kuadrant organization');

      - name: Reject invalid suite
        if: steps.check-org.outputs.is-member == 'true' && steps.parse-command.outputs.suite == ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ Invalid command. Usage: `/test-e2e happy`, `/test-e2e full` or `/test-e2e gevals`\n\n' +
                    '**Suite Guide:**\n' +
                    '- `happy`: Quick smoke test (Ginkgo).\n' +
                    '- `gevals`: LLM-based tool routing tests. Use for changes to broker, router, or tool-calling logic.\n' +
                    '- `full`: Complete suite (Ginkgo + Gevals + Conformance). Use for final verification.'
            });
            core.setFailed('Invalid suite specified');

  e2e-tests:
    needs: check-permission
    if: needs.check-permission.outputs.is-member == 'true' && needs.check-permission.outputs.suite != ''
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      MODEL_KEY: ${{ secrets.MODEL_KEY }}
      MODEL_BASE_URL: ${{ secrets.MODEL_BASE_URL }}

    steps:
      - name: Get PR branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('ref', pr.data.head.ref);
            core.setOutput('sha', pr.data.head.sha);

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Create Kind cluster
        run: kind create cluster --name mcp-gateway --config config/kind/cluster-ci.yaml

      - name: Setup CI environment
        run: make ci-setup

      - name: Setup Fallback LLM (Ollama)
        if: (needs.check-permission.outputs.suite == 'gevals' || needs.check-permission.outputs.suite == 'full') && env.MODEL_KEY == ''
        uses: ai-action/setup-ollama@v2

      - name: Run Ollama (Fallback)
        if: (needs.check-permission.outputs.suite == 'gevals' || needs.check-permission.outputs.suite == 'full') && env.MODEL_KEY == ''
        run: |
          ollama serve &
          timeout 60s bash -c 'until curl -s http://localhost:11434 > /dev/null; do sleep 2; done'
          ollama pull qwen2.5:1.5b
          echo "OPENAI_BASE_URL=http://localhost:11434/v1" >> $GITHUB_ENV
          echo "OPENAI_API_KEY=ollama" >> $GITHUB_ENV
          sed -i 's/model: .*/model: "openai:qwen2.5:1.5b"/' evals/gemini-agent/agent.yaml

      - name: Run E2E tests (happy)
        if: needs.check-permission.outputs.suite == 'happy'
        run: make test-e2e-happy

      - name: Run E2E tests (full)
        if: needs.check-permission.outputs.suite == 'full'
        run: |
          if [ -n "$MODEL_KEY" ]; then
            export OPENAI_API_KEY="$MODEL_KEY"
            export OPENAI_BASE_URL="$MODEL_BASE_URL"
          fi
          make test-e2e-all-ci

      - name: Run E2E tests (gevals)
        if: needs.check-permission.outputs.suite == 'gevals'
        run: |
          if [ -n "$MODEL_KEY" ]; then
            export OPENAI_API_KEY="$MODEL_KEY"
            export OPENAI_BASE_URL="$MODEL_BASE_URL"
          fi
          make test-e2e-gevals

      - name: Collect logs on failure
        if: failure()
        run: |
          make ci-debug-logs || true
          make ci-debug-test-servers-logs || true

      - name: Report success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ E2E tests (\`${{ needs.check-permission.outputs.suite }}\`) passed on commit ${{ steps.pr.outputs.sha }}`
            });

      - name: Report failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ E2E tests (\`${{ needs.check-permission.outputs.suite }}\`) failed on commit ${{ steps.pr.outputs.sha }}. [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });
