name: E2E Tests (on-demand)

on:
  issue_comment:
    types: [created]

jobs:
  check-permission:
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/test-e2e')
    outputs:
      is-member: ${{ steps.check-org.outputs.is-member }}
      suite: ${{ steps.parse-command.outputs.suite }}
      make-target: ${{ steps.resolve.outputs.make_target }}
      suite-name: ${{ steps.resolve.outputs.suite_name }}
    steps:
      - name: Check org membership
        id: check-org
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const response = await github.rest.orgs.checkMembershipForUser({
                org: 'Kuadrant',
                username: context.payload.comment.user.login
              });
              core.setOutput('is-member', response.status === 204 || response.status === 302);
            } catch (error) {
              core.setOutput('is-member', false);
            }

      - name: Parse command
        id: parse-command
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # extract suite from "/test-e2e <suite>" (env var, not inline interpolation)
          SUITE=$(echo "$COMMENT_BODY" | grep -oP '/test-e2e\s+\K\w[-\w]*' || echo "")
          echo "suite=$SUITE" >> $GITHUB_OUTPUT

      - name: Checkout (for shared suite list)
        uses: actions/checkout@v4
        with:
          sparse-checkout: build/known-suites.txt
          sparse-checkout-cone-mode: false

      - name: Resolve make target
        id: resolve
        env:
          SUITE: ${{ steps.parse-command.outputs.suite }}
        run: |
          KNOWN="$(cat build/known-suites.txt | tr '\n' ' ' | xargs)"
          case "$SUITE" in
            happy|pr)
              echo "make_target=test-e2e-pr" >> $GITHUB_OUTPUT
              echo "suite_name=" >> $GITHUB_OUTPUT
              ;;
            pr-extended)
              echo "make_target=test-e2e-pr-extended" >> $GITHUB_OUTPUT
              echo "suite_name=" >> $GITHUB_OUTPUT
              ;;
            full)
              echo "make_target=test-e2e-ci-full" >> $GITHUB_OUTPUT
              echo "suite_name=" >> $GITHUB_OUTPUT
              ;;
            "")
              echo "make_target=" >> $GITHUB_OUTPUT
              echo "suite_name=" >> $GITHUB_OUTPUT
              ;;
            *)
              if echo "$KNOWN" | grep -qw "$SUITE"; then
                echo "make_target=test-e2e-suite" >> $GITHUB_OUTPUT
                echo "suite_name=$SUITE" >> $GITHUB_OUTPUT
              else
                echo "make_target=" >> $GITHUB_OUTPUT
                echo "suite_name=" >> $GITHUB_OUTPUT
              fi
              ;;
          esac

      - name: React to comment
        if: steps.check-org.outputs.is-member == 'true' && steps.resolve.outputs.make_target != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Reject non-members
        if: steps.check-org.outputs.is-member != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: '-1'
            });
            core.setFailed('User is not a member of the Kuadrant organization');

      - name: Read known suites
        if: steps.check-org.outputs.is-member == 'true' && steps.resolve.outputs.make_target == ''
        id: known
        run: |
          echo "suites=$(sed 's/.*/`&`/' build/known-suites.txt | paste -sd, - | sed 's/,/, /g')" >> "$GITHUB_OUTPUT"

      - name: Reject invalid suite
        if: steps.check-org.outputs.is-member == 'true' && steps.resolve.outputs.make_target == ''
        uses: actions/github-script@v7
        env:
          KNOWN_SUITES: ${{ steps.known.outputs.suites }}
        with:
          script: |
            const suites = process.env.KNOWN_SUITES;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Invalid suite. Usage:\n` +
                '```\n' +
                '/test-e2e <suite>       # named suite\n' +
                '/test-e2e pr            # curated PR gate (~31 specs)\n' +
                '/test-e2e pr-extended   # broader coverage (~61 specs)\n' +
                '/test-e2e full          # all suites\n' +
                '```\n' +
                `Available suites: ${suites}`
            });
            core.setFailed('Invalid suite specified');

  e2e-tests:
    needs: check-permission
    if: needs.check-permission.outputs.is-member == 'true' && needs.check-permission.outputs.make-target != ''
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read

    steps:
      - name: Get PR branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('ref', pr.data.head.ref);
            core.setOutput('sha', pr.data.head.sha);

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Probe baked CI node image
        id: ci-node
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: |
          hit=false
          if image="$(make -s print-ci-node-image 2>/dev/null)"; then
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin >/dev/null 2>&1 || true
            if docker manifest inspect "$image" >/dev/null 2>&1; then
              hit=true
            fi
          else
            image=""
            echo "could not compute baked CI node image ref, using stock kindest/node"
          fi
          {
            echo "hit=$hit"
            echo "image=$image"
          } >> "$GITHUB_OUTPUT"
          echo "baked CI node image: $image (hit=$hit)"

      - name: Create Kind cluster
        run: |
          if [ "${{ steps.ci-node.outputs.hit }}" = "true" ]; then
            make kind-create-cluster-ci KIND_CLUSTER_IMAGE="${{ steps.ci-node.outputs.image }}"
          else
            make kind-create-cluster-ci
          fi

      - name: Setup CI environment
        run: make ci-setup

      - name: Run E2E tests
        env:
          E2E_MAKE_TARGET: ${{ needs.check-permission.outputs.make-target }}
          E2E_SUITE: ${{ needs.check-permission.outputs.suite-name }}
        run: |
          echo "on-demand run: suite=$E2E_SUITE target=$E2E_MAKE_TARGET"
          if [ -n "$E2E_SUITE" ]; then
            make "$E2E_MAKE_TARGET" SUITE="$E2E_SUITE"
          else
            make "$E2E_MAKE_TARGET"
          fi

      - name: Collect logs on failure
        if: failure()
        run: |
          make ci-debug-logs || true
          make ci-debug-test-servers-logs || true

      - name: Report result
        if: always()
        uses: actions/github-script@v7
        env:
          E2E_SUITE: ${{ needs.check-permission.outputs.suite }}
          PR_SHA: ${{ steps.pr.outputs.sha }}
        with:
          script: |
            const suite = process.env.E2E_SUITE;
            const sha = process.env.PR_SHA;
            const passed = '${{ job.status }}' === 'success';
            const icon = passed ? ':white_check_mark:' : ':x:';
            const status = passed ? 'passed' : 'failed';
            const logsUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let body = `${icon} E2E \`${suite}\` ${status} on ${sha.substring(0, 7)}`;
            if (!passed) {
              body += ` — [logs](${logsUrl})`;
            }
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
