name: E2E Tests

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'examples/**'
      - 'LICENSE'
      - 'charts/**'
      - '.coderabbit.yaml'
      - '.gitignore'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'examples/**'
      - 'LICENSE'
      - 'charts/**'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # determine which suites to run based on labels and changed files
  route:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.ref == 'refs/heads/main'
    outputs:
      suites: ${{ steps.router.outputs.suites }}
      make_target: ${{ steps.router.outputs.make_target }}
      suggestions: ${{ steps.router.outputs.suggestions }}
      is_full: ${{ steps.router.outputs.is_full }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect PR labels
        id: labels
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name).join(',');
            core.setOutput('labels', labels);

      - name: Collect changed files
        id: changes
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const names = files.map(f => f.filename).join('\n');
            core.setOutput('files', names);

      - name: Route suites
        id: router
        env:
          EVENT_TYPE: ${{ github.event_name }}
          PR_LABELS: ${{ steps.labels.outputs.labels || '' }}
          CHANGED_FILES: ${{ steps.changes.outputs.files || '' }}
        run: bash build/suite-router.sh

  e2e-tests:
    needs: route
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Determine test-server image source
        id: test-server-images
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          source=pull
          case "${{ github.event_name }}" in
            pull_request)
              if ! files=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" --paginate --jq '.[] | .filename, (.previous_filename // empty)'); then
                echo "could not list PR files, building test servers locally"
                source=build
              elif echo "$files" | grep -qE '^(tests/servers/|internal/tests/)'; then
                source=build
              fi
              ;;
            push)
              if ! git fetch --quiet --depth=1 origin "${{ github.event.before }}"; then
                echo "could not fetch pre-push commit, building test servers locally"
                source=build
              elif ! git diff --quiet "${{ github.event.before }}" HEAD -- tests/servers internal/tests; then
                source=build
              fi
              ;;
            *)
              if ! git fetch --quiet --depth=1 origin main; then
                echo "could not fetch origin main, building test servers locally"
                source=build
              elif ! git diff --quiet FETCH_HEAD HEAD -- tests/servers internal/tests; then
                source=build
              fi
              ;;
          esac
          echo "source=$source" >> "$GITHUB_OUTPUT"
          echo "test-server image source: $source"

      - name: Probe baked CI node image
        id: ci-node
        env:
          DETECTED_TEST_SERVER_SOURCE: ${{ steps.test-server-images.outputs.source }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          hit=false
          if image="$(make -s print-ci-node-image 2>/dev/null)"; then
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin >/dev/null 2>&1 || true
            if docker manifest inspect "$image" >/dev/null 2>&1; then
              hit=true
            fi
          else
            image=""
            echo "could not compute baked CI node image ref, using stock kindest/node"
          fi
          source="$DETECTED_TEST_SERVER_SOURCE"
          if [ "$hit" = "true" ] && [ "$source" = "pull" ]; then
            source=baked
          fi
          {
            echo "hit=$hit"
            echo "image=$image"
            echo "test-server-source=$source"
          } >> "$GITHUB_OUTPUT"
          echo "baked CI node image: $image (hit=$hit), test-server image source: $source"

      - name: Compute image build LDFLAGS
        id: ldflags
        run: echo "ldflags=$(make -s print-ldflags)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ghcr.io/kuadrant/mcp-gateway:latest
          build-args: |
            LDFLAGS=${{ steps.ldflags.outputs.ldflags }}
          cache-from: type=gha,scope=gateway-image
          cache-to: type=gha,mode=max,scope=gateway-image

      - name: Build controller image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.controller
          load: true
          tags: ghcr.io/kuadrant/mcp-controller:latest
          cache-from: type=gha,scope=controller-image
          cache-to: type=gha,mode=max,scope=controller-image

      - name: Create Kind cluster
        run: |
          if [ "${{ steps.ci-node.outputs.hit }}" = "true" ]; then
            make kind-create-cluster-ci KIND_CLUSTER_IMAGE="${{ steps.ci-node.outputs.image }}"
          else
            make kind-create-cluster-ci
          fi

      - name: Setup CI environment
        run: make ci-setup GATEWAY_IMAGE_SOURCE=prebuilt TEST_SERVER_IMAGE_SOURCE=${{ steps.ci-node.outputs.test-server-source }}

      - name: Run E2E tests
        env:
          E2E_MAKE_TARGET: ${{ needs.route.outputs.make_target }}
          E2E_SUITES: ${{ needs.route.outputs.suites }}
          E2E_IS_FULL: ${{ needs.route.outputs.is_full }}
        run: |
          echo "router decision: target=$E2E_MAKE_TARGET suites=$E2E_SUITES full=$E2E_IS_FULL"
          if [ "$E2E_MAKE_TARGET" = "test-e2e-suite" ]; then
            # run pr suite first, then each requested suite
            make test-e2e-pr
            for suite in $(echo "$E2E_SUITES" | tr -d '[]"' | tr ',' '\n'); do
              [ "$suite" = "pr" ] && continue
              [ -z "$suite" ] && continue
              echo "--- running suite: $suite ---"
              if [ "$suite" = "pr-extended" ]; then
                make test-e2e-pr-extended
              else
                make test-e2e-suite SUITE="$suite"
              fi
            done
          else
            make "$E2E_MAKE_TARGET"
          fi

      - name: Collect logs on failure
        if: failure()
        run: |
          make ci-debug-logs || true
          make ci-debug-test-servers-logs || true

  # post/update idempotent bot comment on PRs
  bot-comment:
    needs: [route, e2e-tests]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      pull-requests: write
    steps:
      - name: Checkout (for known-suites.txt)
        uses: actions/checkout@v4
        with:
          sparse-checkout: build/known-suites.txt
          sparse-checkout-cone-mode: false

      - name: Read known suites
        id: known
        run: |
          list=$(sed 's/.*/`&`/' build/known-suites.txt | paste -sd, - | sed 's/,/, /g')
          echo "suites=$list" >> "$GITHUB_OUTPUT"

      - name: Post e2e suite comment
        uses: actions/github-script@v7
        env:
          SUITES_RAN: ${{ needs.route.outputs.suites }}
          SUGGESTIONS: ${{ needs.route.outputs.suggestions }}
          E2E_RESULT: ${{ needs.e2e-tests.result }}
          KNOWN_SUITES: ${{ steps.known.outputs.suites }}
        with:
          script: |
            const marker = '<!-- e2e-suite-bot -->';
            const suitesRan = process.env.SUITES_RAN || '["pr"]';
            const suggestions = (process.env.SUGGESTIONS || '').split(',').filter(Boolean);
            const result = process.env.E2E_RESULT || 'unknown';
            const icon = result === 'success' ? ':white_check_mark:' : result === 'failure' ? ':x:' : ':hourglass:';
            const knownSuites = process.env.KNOWN_SUITES;

            let body = `${marker}\n### E2E suites\n\n`;
            body += `${icon} The PR gate ran suites: \`${suitesRan}\` (${result})\n\n`;

            if (suggestions.length > 0) {
              body += `**Suggested additional suites** (based on changed files):\n`;
              for (const s of suggestions) {
                body += `- \`${s}\`\n`;
              }
              body += '\n';
            }

            body += `**Request additional coverage:**\n`;
            body += '```\n';
            body += '/test-e2e <suite>      # run a named suite\n';
            body += '/test-e2e pr-extended   # broader coverage (~61 specs)\n';
            body += '/test-e2e full          # all suites\n';
            body += '```\n\n';

            body += `**Available suites:** ${knownSuites}\n\n`;

            body += `**Or apply labels:** \`e2e/<suite>\`, \`e2e/pr-extended\`, \`e2e/full\`\n\n`;

            body += `> Some suites need extra infra (auth-policy, tls, multi-gateway) and are maintainer-triggered.\n`;

            // find and update existing comment, or create new one
            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
              });

              const existing = comments.find(c => c.body && c.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  body,
                });
              }
            } catch (err) {
              core.info(`skipping bot comment on fork PR (insufficient permissions): ${err.message}`);
            }
