name: Helm Install Test

on:
  pull_request:
    branches: [main]
    paths:
      - 'charts/**'
      - 'config/crd/**'
      - 'api/**'
      - 'Dockerfile*'
      - '.github/workflows/helm-install-test.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  helm-install-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'

      - name: Install tools
        run: make tools

      - name: Run helm install test
        run: make test-helm-install

      - name: Collect debug info on failure
        if: failure()
        run: |
          echo "=== Helm releases ==="
          bin/helm list -A 2>/dev/null || true
          echo "=== Pods ==="
          kubectl get pods -A 2>/dev/null || true
          echo "=== Events ==="
          kubectl get events -A --sort-by='.lastTimestamp' 2>/dev/null | tail -50 || true
          echo "=== Broker logs ==="
          kubectl logs -n mcp-system deployment/mcp-gateway --tail=100 2>/dev/null || true
          echo "=== Controller logs ==="
          kubectl logs -n mcp-system deployment/mcp-gateway-controller --tail=100 2>/dev/null || true
