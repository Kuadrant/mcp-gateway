---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# extends mcp-system with image tag overrides for CI
resources:
  - ../mcp-system

images:
  - name: ghcr.io/kuadrant/mcp-controller
    newTag: latest
  - name: ghcr.io/kuadrant/mcp-gateway
    newTag: latest

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: mcp-gateway-controller
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mcp-gateway-controller
      spec:
        template:
          spec:
            containers:
              - name: mcp-controller
                env:
                  - name: RELATED_IMAGE_ROUTER_BROKER
                    value: ghcr.io/kuadrant/mcp-gateway:latest
