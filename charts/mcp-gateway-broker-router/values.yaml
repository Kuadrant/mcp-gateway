# Default values for mcp-gateway-broker-router.

image:
  repository: ghcr.io/kuadrant/mcp-gateway
  # tag defaults to Chart.appVersion if empty
  tag: ""
  pullPolicy: IfNotPresent

# Public hostname for the MCP Gateway (used in --mcp-gateway-public-host)
publicHost: ""

# Private host for hairpin requests (used in --mcp-gateway-private-host)
privateHost: ""

# Log level for the broker-router binary
logLevel: ""

# Enable URL elicitation (/tokens endpoint)
urlElicitation: false

# How often (in seconds) the broker pings upstream MCP servers (0 uses binary default)
backendPingIntervalSeconds: 0

# Session store configuration
sessionStore:
  # Name of the secret containing CACHE_CONNECTION_STRING
  secretName: ""

# Trusted headers key configuration
trustedHeadersKey:
  # Name of the secret containing the public key
  secretName: ""

# OAuth Protected Resource metadata
oauthProtectedResource: {}
  # resourceName: "MCP Server"
  # resource: ""
  # authorizationServers: []
  # bearerMethodsSupported: []
  # scopesSupported: []

# HTTPRoute configuration for routing traffic to the broker-router
httpRoute:
  enabled: true
  gatewayRef:
    name: ""
    namespace: ""
    sectionName: ""

# Network policy for broker-router pods
networkPolicy:
  enabled: false
