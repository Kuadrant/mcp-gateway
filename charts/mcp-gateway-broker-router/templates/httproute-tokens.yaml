{{- if and .Values.httpRoute.enabled .Values.urlElicitation }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "broker-router.fullname" . }}-tokens-route
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "broker-router.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.httpRoute.gatewayRef.name }}
      namespace: {{ .Values.httpRoute.gatewayRef.namespace }}
      sectionName: {{ .Values.httpRoute.gatewayRef.sectionName }}
  hostnames:
    - {{ .Values.publicHost | quote }}
  rules:
    - name: tokens
      matches:
        - path:
            type: PathPrefix
            value: /tokens
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "broker-router.fullname" . }}
          port: 8080
          weight: 1
{{- end }}
