{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "broker-router.fullname" . }}-route
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "broker-router.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.httpRoute.gatewayRef.name }}
      namespace: {{ .Values.httpRoute.gatewayRef.namespace }}
      sectionName: {{ .Values.httpRoute.gatewayRef.sectionName }}
  hostnames:
    - {{ .Values.publicHost | quote }}
  rules:
    - name: mcp
      matches:
        - path:
            type: PathPrefix
            value: /mcp
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove:
              - mcp-init-host
              - router-key
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "broker-router.fullname" . }}
          port: 8080
          weight: 1
    - name: well-known
      matches:
        - path:
            type: PathPrefix
            value: /.well-known/oauth-protected-resource
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "broker-router.fullname" . }}
          port: 8080
          weight: 1
    - name: status
      matches:
        - path:
            type: PathPrefix
            value: /status
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "broker-router.fullname" . }}
          port: 8080
          weight: 1
{{- end }}
